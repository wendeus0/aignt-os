interface:
  display_name: "Repo Automation"
  short_description: "Automatiza fluxo de commit, build/rebuild de container, validação contra main e workflows operacionais."
  brand_color: "#7C3AED"
  default_prompt: |
    Use a skill repo-automation para implementar automações operacionais do repositório.
    Foque apenas em:
    - fluxo de commit para Git/GitHub
    - build e rebuild de container
    - gatilhos de rebuild por mudança de código
    - validação contra main
    - arquivos de workflow e scripts operacionais

    Trabalhe com mudanças práticas no repositório.
    Não redefina a arquitetura.
    Não amplie escopo para lógica de produto.
    Se não houver acesso real para executar integrações externas, gere arquivos e conteúdos prontos para uso.

policy:
  allow_implicit_invocation: false
