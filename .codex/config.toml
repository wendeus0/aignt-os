# Project-local Codex profiles used by the isolated development container.

[features]
multi_agent = true

[profiles.container_planning]
model = "gpt-5.2-codex"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[profiles.container_aggressive]
model = "gpt-5.2-codex"
approval_policy = "never"
sandbox_mode = "danger-full-access"

[sandbox_workspace_write]
network_access = true

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

# ---------------------------------------------------------------------------
# MCP servers — baseline segura para o fluxo operacional do projeto
#
# O launcher `./scripts/dev-codex.sh` usa este arquivo como base e:
#   - usa o profile `container_planning` por padrao para favorecer discovery e
#     planejamento com sandbox mais restrito;
#   - mantem `container_aggressive` como profile explicito para execucao mais
#     automatica dentro do ambiente isolado;
#   - habilita o MCP oficial do GitHub quando houver token no ambiente;
#   - reutiliza esse MCP para GitHub Actions via `--toolsets=default,actions`;
#   - deixa MCPs dependentes de recursos ausentes no `codex-dev` fora do baseline.
#
# Pré-requisito para habilitar GitHub MCP:
#   export GITHUB_PERSONAL_ACCESS_TOKEN=ghp_...
# Compatibilidade:
#   se apenas `GITHUB_TOKEN` estiver definido, o launcher o reaproveita como
#   fallback para `GITHUB_PERSONAL_ACCESS_TOKEN`.
#
# Nota:
#   o MCP `openaiDeveloperDocs` e parte fixa do baseline para consulta oficial
#   de documentacao do OpenAI/Codex;
#   o `codex-dev` permanece sem `docker.sock`; por isso o MCP de Docker nao faz
#   parte do baseline seguro deste ambiente isolado.
# ---------------------------------------------------------------------------
