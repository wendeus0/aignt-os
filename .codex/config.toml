# Project-local Codex configuration for SynapseOS.
# Repo defaults should be safe for daily work and explicit about multi-agent roles.

model = "gpt-5.4"
personality = "pragmatic"
model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "high"
model_reasoning_summary = "auto"
model_verbosity = "medium"

approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"

[features]
multi_agent = true
prevent_idle_sleep = true
runtime_metrics = true
suppress_unstable_features_warning = true
undo = true

[sandbox_workspace_write]
network_access = true

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[agents]
max_threads = 6
max_depth = 1

[agents.explorer]
description = "Read-only codebase explorer for mapping SynapseOS architecture, affected code paths, specs, ADRs, and operational evidence before changes."
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "Read-only reviewer focused on correctness, regressions, security, missing tests, and technical debt risk."
config_file = "agents/reviewer.toml"

[agents.worker]
description = "Implementation-focused agent for small, targeted changes after the task is understood and scoped."
config_file = "agents/worker.toml"

[agents.monitor]
description = "Operational monitor for long-running commands, logs, CI evidence, runtime checks, and failure capture."
config_file = "agents/monitor.toml"

[profiles.container_planning]
model = "gpt-5.4"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"
model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "high"
model_reasoning_summary = "auto"
model_verbosity = "medium"

[profiles.container_aggressive]
model = "gpt-5.4"
approval_policy = "never"
sandbox_mode = "danger-full-access"
web_search = "live"
model_reasoning_effort = "medium"
model_reasoning_summary = "auto"
model_verbosity = "medium"

#Notes
# - container_planning is the default safe profile for discovery and implementation.
# - container_aggressive is reserved for the isolated codex-dev environment only.
# - openaiDeveloperDocs stays in the baseline because it is low-friction and
#   useful for validating Codex/OpenAI behavior.
