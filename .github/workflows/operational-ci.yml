name: operational-ci

on:
  pull_request:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  branch-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request head
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Checkout repository
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch alignment
        env:
          AIGNT_EVENT_NAME: ${{ github.event_name }}
          AIGNT_HEAD_REF: ${{ github.head_ref }}
          AIGNT_REF_NAME: ${{ github.ref_name }}
        run: |
          branch_name="$AIGNT_REF_NAME"
          if [[ "$AIGNT_EVENT_NAME" == "pull_request" ]]; then
            branch_name="$AIGNT_HEAD_REF"
          fi
          ./scripts/validate-branch.sh --fetch --allow-main --base-ref origin/main --branch-name "$branch_name"

  docker-preflight:
    runs-on: ubuntu-latest
    needs: branch-validation
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Docker preflight
        run: ./scripts/docker-preflight.sh

  repo-checks:
    runs-on: ubuntu-latest
    needs:
      - branch-validation
      - docker-preflight
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Run repository operational checks
        run: ./scripts/commit-check.sh --sync-dev --skip-branch-validation --skip-docker --skip-security --allow-main

  security-review:
    runs-on: ubuntu-latest
    needs: repo-checks
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run operational security gate
        run: ./scripts/security-gate.sh
