name: container-build

on:
  pull_request:
    paths:
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Dockerfile"
      - "compose.yaml"
      - "docker-compose.yml"
      - "scripts/**"
      - ".python-version"
      - ".github/workflows/container-build.yml"
  push:
    branches-ignore:
      - main
    paths:
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Dockerfile"
      - "compose.yaml"
      - "docker-compose.yml"
      - "scripts/**"
      - ".python-version"
      - ".github/workflows/container-build.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Docker preflight
        run: ./scripts/docker-preflight.sh --build

      - name: Run operational security gate
        run: ./scripts/security-gate.sh
