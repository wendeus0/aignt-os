services:
  synapse-os:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_UID: ${SYNAPSE_OS_UID:-1000}
        APP_GID: ${SYNAPSE_OS_GID:-1000}
    image: synapse-os:dev
    command: ["runtime", "run"]
    environment:
      SYNAPSE_OS_ENVIRONMENT: development
    user: "${SYNAPSE_OS_UID:-1000}:${SYNAPSE_OS_GID:-1000}"
    volumes:
      - ./artifacts:/app/artifacts
    working_dir: /app
    healthcheck:
      test: ["CMD", "synapse", "runtime", "ready"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 2s
    init: true
    stdin_open: true
    tty: true
